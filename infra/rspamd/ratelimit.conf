# Rate limiting per authenticated user (not just IP)
# Prevents individual mailbox users from spamming

rates {
  # Per authenticated sender
  to = {
    selector = "authenticated";
    symbol = "RATELIMIT_RCPT";
    bucket = [
      { burst = 50; rate = "5 / 1m"; },   # 5 recipients per minute burst 50
      { burst = 200; rate = "200 / 1h"; }, # 200 recipients per hour
    ];
  }

  # Per sender address
  from = {
    selector = "from";
    symbol = "RATELIMIT_FROM";
    bucket = [
      { burst = 30; rate = "3 / 1m"; },   # 3 emails per minute
      { burst = 100; rate = "100 / 1h"; }, # 100 per hour
    ];
  }
}
