# ==========================================
# WenMail — Dovecot local overrides
# ==========================================

# Protocols
protocols = imap lmtp

# Connection limits
mail_max_userip_connections = 50

# Logging
log_path = /var/log/dovecot.log
info_log_path = /var/log/dovecot-info.log

# Authentication
disable_plaintext_auth = yes
auth_mechanisms = plain login

# Allow plaintext auth from localhost and Docker (Roundcube connects locally)
login_trusted_networks = 127.0.0.0/8 172.16.0.0/12

# Use SQL for user lookup
passdb {
  driver = sql
  args = /etc/dovecot/dovecot-sql.conf
}

userdb {
  driver = sql
  args = /etc/dovecot/dovecot-sql.conf
}

# Mail location — Maildir format under /var/mail/vhosts/<domain>/<user>/
mail_location = maildir:/var/mail/vhosts/%d/%n
mail_uid = 5000
mail_gid = 5000
mail_privileged_group = vmail
first_valid_uid = 5000
last_valid_uid = 5000

# Namespaces
namespace inbox {
  inbox = yes
  separator = /

  mailbox Drafts {
    auto = subscribe
    special_use = \Drafts
  }
  mailbox Sent {
    auto = subscribe
    special_use = \Sent
  }
  mailbox Trash {
    auto = subscribe
    special_use = \Trash
  }
  mailbox Junk {
    auto = subscribe
    special_use = \Junk
  }
  mailbox Archive {
    auto = no
    special_use = \Archive
  }
}

# SSL/TLS (Let's Encrypt)
ssl = required
ssl_cert = </etc/letsencrypt/live/mail.wenvia.global/fullchain.pem
ssl_key = </etc/letsencrypt/live/mail.wenvia.global/privkey.pem
ssl_min_protocol = TLSv1.2

# LMTP — receives mail from Postfix
service lmtp {
  unix_listener /var/spool/postfix/private/dovecot-lmtp {
    mode = 0600
    user = postfix
    group = postfix
  }
}

# Auth service — Postfix uses this for SASL
service auth {
  unix_listener /var/spool/postfix/private/auth {
    mode = 0660
    user = postfix
    group = postfix
  }
  unix_listener auth-userdb {
    mode = 0660
    user = vmail
    group = vmail
  }
}

service auth-worker {
  user = vmail
}

# Sieve — auto-move spam to Junk
protocol lmtp {
  mail_plugins = $mail_plugins sieve
}

plugin {
  sieve = /etc/dovecot/sieve/default.sieve
  sieve_default = /etc/dovecot/sieve/default.sieve
  sieve_default_name = default
}
