# ==========================================
# WenMail Platform — Nginx Reverse Proxy
# ==========================================

# Security headers (applied to all server blocks)
map $sent_http_content_type $referrer_policy {
    default "strict-origin-when-cross-origin";
}


# ---- www redirects ----
server {
    listen 80;
    listen [::]:80;
    server_name www.wenvia.global www.mail.wenvia.global;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.wenvia.global;
    ssl_certificate /etc/letsencrypt/live/wenvia.global/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wenvia.global/privkey.pem;
    return 301 https://wenvia.global$request_uri;
}
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.mail.wenvia.global;
    ssl_certificate /etc/letsencrypt/live/mail.wenvia.global/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.wenvia.global/privkey.pem;
    return 301 https://mail.wenvia.global$request_uri;
}

# ---- Landing Page + Admin (wenvia.global) ----
server {
    listen 80;
    listen [::]:80;
    server_name wenvia.global;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name wenvia.global;

    ssl_certificate /etc/letsencrypt/live/wenvia.global/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wenvia.global/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    client_max_body_size 50m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Frontend (landing + admin)
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Backend API
    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ---- Client Portal (wpanel.wenvia.global) ----
server {
    listen 80;
    listen [::]:80;
    server_name wpanel.wenvia.global;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name wpanel.wenvia.global;

    ssl_certificate /etc/letsencrypt/live/wpanel.wenvia.global/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wpanel.wenvia.global/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    client_max_body_size 50m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Frontend (portal routes)
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Backend API
    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ---- IP-based fallback — redirect to domain ----
server {
    listen 80;
    listen [::]:80;
    server_name 139.84.143.55;

    location / {
        return 301 https://wenvia.global$request_uri;
    }
}

# ---- Webmail (mail.wenvia.global) ----
# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name mail.wenvia.global;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name mail.wenvia.global;

    ssl_certificate /etc/letsencrypt/live/mail.wenvia.global/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.wenvia.global/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    client_max_body_size 50m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Redirect root to /mail/login
    location = / {
        return 302 /mail/login;
    }

    # Setup help page
    location = /setup-help.html {
        alias /var/www/wenmail/setup-help.html;
    }

    # Webmail API
    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Webmail frontend (React SPA)
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
