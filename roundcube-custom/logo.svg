<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80">
  <defs>
    <linearGradient id="glossy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4338ca;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="envelope-shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc;stop-opacity:0.9" />
      <stop offset="40%" style="stop-color:#818cf8;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4338ca" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Icon: Envelope with arrow -->
  <g transform="translate(10, 10)" filter="url(#shadow)">
    <!-- Envelope body -->
    <rect x="2" y="14" width="52" height="38" rx="5" ry="5" fill="url(#glossy)"/>
    <!-- Envelope shine overlay -->
    <rect x="2" y="14" width="52" height="38" rx="5" ry="5" fill="url(#envelope-shine)"/>
    <!-- Envelope flap -->
    <path d="M2 19 L28 38 L54 19" fill="none" stroke="#e0e7ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Send arrow -->
    <g transform="translate(38, 8)">
      <circle cx="10" cy="10" r="12" fill="#10b981" opacity="0.95"/>
      <path d="M6 10 L14 10 M11 6 L15 10 L11 14" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Text: WenMail -->
  <text x="75" y="50" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#818cf8">Wen</tspan><tspan fill="#e2e8f0">Mail</tspan>
  </text>
</svg>
