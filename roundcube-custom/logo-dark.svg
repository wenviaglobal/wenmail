<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80">
  <defs>
    <linearGradient id="glossy-dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="envelope-shine-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c7d2fe;stop-opacity:0.7" />
      <stop offset="40%" style="stop-color:#a5b4fc;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow-dark" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#6366f1" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Icon: Envelope with arrow -->
  <g transform="translate(10, 10)" filter="url(#shadow-dark)">
    <rect x="2" y="14" width="52" height="38" rx="5" ry="5" fill="url(#glossy-dark)"/>
    <rect x="2" y="14" width="52" height="38" rx="5" ry="5" fill="url(#envelope-shine-dark)"/>
    <path d="M2 19 L28 38 L54 19" fill="none" stroke="#e0e7ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(38, 8)">
      <circle cx="10" cy="10" r="12" fill="#34d399" opacity="0.95"/>
      <path d="M6 10 L14 10 M11 6 L15 10 L11 14" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Text: WenMail (light text for dark mode) -->
  <text x="75" y="50" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9" letter-spacing="-0.5">
    <tspan fill="#a5b4fc">Wen</tspan><tspan fill="#f1f5f9">Mail</tspan>
  </text>
</svg>
